<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Blog de Laurent Canis — Engineering Leader, Cloud Infrastructure, MBA HEC Montréal.">
  <title>Blog — Laurent Canis</title>
  <link rel="stylesheet" href="style.css">
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>

  <!-- ===== Navigation ===== -->
  <nav class="nav" aria-label="Navigation principale">
    <div class="container nav-inner">
      <a class="nav-logo" href="/">
        <img src="assets/CANIX_tete_dino_cafe.png" alt="Canix" class="nav-logo-img">
        Laurent Canis
      </a>

      <ul class="nav-links" role="list">
        <li><a href="/#about">Résumé</a></li>
        <li><a href="/#experience">Expériences</a></li>
        <li><a href="/#education">Formation</a></li>
        <li><a href="/#skills">Compétences</a></li>
        <li><a href="/#contact">Contact</a></li>
        <li><a href="/blog.html" class="nav-active">Blog</a></li>
      </ul>

      <div class="nav-actions">
        <span class="auth-indicator" id="auth-indicator"></span>
        <button class="theme-toggle" aria-label="Basculer le mode sombre" title="Mode sombre / clair">
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="nav-toggle" aria-label="Ouvrir le menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ===== Blog ===== -->
  <main class="section">
    <div class="container">
      <div class="blog-header">
        <h1>Blog</h1>
        <button id="new-article-btn" class="btn btn-primary" style="display:none" onclick="window.location='/new-article.html'">Nouvel article</button>
      </div>

      <div id="articles-list" class="blog-list">
        <p class="text-muted">Chargement…</p>
      </div>
    </div>
  </main>

  <script>
    // Theme toggle
    var html = document.documentElement;
    var themeBtn = document.querySelector('.theme-toggle');
    function setTheme(dark) {
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    }
    themeBtn.addEventListener('click', function () {
      setTheme(html.getAttribute('data-theme') !== 'dark');
    });

    // Mobile menu
    var navToggle = document.querySelector('.nav-toggle');
    var navLinks = document.querySelector('.nav-links');
    navToggle.addEventListener('click', function () {
      var open = navToggle.getAttribute('aria-expanded') === 'true';
      navToggle.setAttribute('aria-expanded', String(!open));
      navLinks.classList.toggle('nav-open', !open);
    });

    // Auth state
    fetch('/api/me').then(r => r.json()).then(data => {
      var indicator = document.getElementById('auth-indicator');
      if (data.loggedIn) {
        indicator.textContent = data.email;
        indicator.className = 'auth-indicator auth-on';
        document.getElementById('new-article-btn').style.display = '';
      } else {
        indicator.innerHTML = '<a href="/login.html">Connexion</a>';
        indicator.className = 'auth-indicator auth-off';
      }
    });

    // Load articles
    fetch('/api/articles').then(r => r.json()).then(articles => {
      var list = document.getElementById('articles-list');
      if (!articles.length) {
        list.innerHTML = '<p class="text-muted">Aucun article pour le moment.</p>';
        return;
      }
      list.innerHTML = articles.map(a => `
        <article class="blog-card">
          <a href="/article.html?id=${a.id}" class="blog-card-title">${escHtml(a.title)}</a>
          <time class="blog-card-date">${new Date(a.published_at).toLocaleDateString('fr-FR', {day:'numeric',month:'long',year:'numeric'})}</time>
        </article>
      `).join('');
    });

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
