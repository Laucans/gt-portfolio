<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Laurent Canis</title>
  <link rel="stylesheet" href="style.css">
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <nav class="nav" aria-label="Navigation principale">
    <div class="container nav-inner">
      <a class="nav-logo" href="/">
        <img src="assets/CANIX_tete_dino_cafe.png" alt="Canix" class="nav-logo-img">
        Laurent Canis
      </a>
      <ul class="nav-links" role="list">
        <li><a href="/#about">Résumé</a></li>
        <li><a href="/blog.html">Blog</a></li>
      </ul>
      <div class="nav-actions">
        <button class="theme-toggle" aria-label="Basculer le mode sombre">
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="section">
    <div class="container" style="max-width:28rem">
      <h1 style="margin-bottom:1.5rem">Connexion</h1>
      <form id="login-form" class="auth-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
        <p id="login-error" class="form-error" style="display:none"></p>
        <button type="submit" class="btn btn-primary" style="width:100%">Se connecter</button>
      </form>
    </div>
  </main>

  <script>
    var html = document.documentElement;
    document.querySelector('.theme-toggle').addEventListener('click', function () {
      var dark = html.getAttribute('data-theme') !== 'dark';
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    });

    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var err = document.getElementById('login-error');
      err.style.display = 'none';
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      }).then(r => r.json()).then(data => {
        if (data.ok) {
          window.location = '/blog.html';
        } else {
          err.textContent = data.error || 'Identifiants invalides';
          err.style.display = '';
        }
      });
    });
  </script>
</body>
</html>
